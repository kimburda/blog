<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  {% feed_meta %}
  {% seo %}
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="{{ '/' | relative_url }}" class="site-name">{{ site.title }}</a>
        <span class="header-divider">|</span>
        <span class="site-tagline">{{ site.description }}</span>
      </div>
      <nav class="header-nav">
        <a href="https://kimburda.github.io" target="_blank" rel="noopener">Main Site</a>
        <a href="https://github.com/kimburda" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>
  <main class="site-main">
    {{ content }}
  </main>
  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; {{ 'now' | date: "%Y" }} Kim Burda &mdash; <a href="https://kimburda.github.io">kimburda.github.io</a></p>
    </div>
  </footer>
</body>
</html>
