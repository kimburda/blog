media: assets/uploads
content:
  - name: posts
    label: Blog Posts
    path: _posts
    type: collection
    filename: "{year}-{month}-{day}-{fields.title}.md"
    fields:
      - name: title
        label: Title
        type: string
      - name: date
        label: Date
        type: date
      - name: tags
        label: Tags
        type: string
      - name: body
        label: Body
        type: rich-text
